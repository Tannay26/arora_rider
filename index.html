<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Arora Rider original fantasy platform adventure">
  <title>Arora Rider - Platform Adventure</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="game-shell">
    <header class="top-panel">
      <div>
        <p class="eyebrow">Platform Adventure</p>
        <h1>Arora Rider</h1>
      </div>
      <div class="level-panel">
        <strong id="levelName">Level 1 - Forest Trail</strong>
        <small id="levelHint">A/D or Arrows run. Space/W/Up jump or fly. Wall jump from walls.</small>
      </div>
    </header>

    <section class="hud-row">
      <div class="stat-pill">HP <strong id="hpText">4 / 4</strong></div>
      <div class="stat-pill">Gems <strong id="gemsText">0 / 0</strong></div>
      <div class="stat-pill">Lives <strong id="livesText">3</strong></div>
      <div class="stat-pill">Keys <strong id="keysText">0</strong></div>
      <div class="stat-pill power-pill"><span id="powerIcon">--</span> <strong id="powerText">No ability</strong></div>
      <div class="stat-pill">Stone Skin <strong id="shieldText">0</strong></div>
      <div class="stat-pill">Status <strong id="statusText">Explore</strong></div>
    </section>

    <section class="canvas-wrap">
      <canvas id="gameCanvas"></canvas>
      <div class="debug-panel" id="debugPanel"></div>
    </section>
  </main>

  <section class="modal" id="endModal" hidden>
    <div class="modal-card">
      <p class="eyebrow" id="endEyebrow">Level Complete</p>
      <h2 id="endTitle">Victory</h2>
      <p id="endText"></p>
      <div class="ability-choices" id="abilityChoices" hidden></div>
      <button class="primary-button" id="restartButton">Continue</button>
    </div>
  </section>

  <script src="core/config.js"></script>
  <script src="core/utils.js"></script>
  <script src="levels/levels.js"></script>
  <script src="systems/InputSystem.js"></script>
  <script src="systems/PhysicsSystem.js"></script>
  <script src="entities/Player.js"></script>
  <script src="entities/PlatformEnemy.js"></script>
  <script src="entities/Collectible.js"></script>
  <script src="systems/CameraSystem.js"></script>
  <script src="systems/RenderSystem.js"></script>
  <script src="ui/Hud.js"></script>
  <script src="systems/Game.js"></script>
  <script src="app.js"></script>
</body>
</html>
