<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Arora Rider Phase 1 browser game prototype">
  <title>Arora Rider</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="game-shell">
    <header class="game-header">
      <div>
        <p class="eyebrow">Phase 1 Prototype</p>
        <h1>Arora Rider</h1>
      </div>
      <p class="controls">Move: A / D or Arrow Keys</p>
    </header>

    <section class="canvas-wrap" aria-label="Arora Rider game canvas">
      <canvas id="gameCanvas"></canvas>
      <div class="debug-panel" id="debugPanel" aria-live="polite"></div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
